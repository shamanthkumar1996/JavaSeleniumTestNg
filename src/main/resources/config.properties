# ===================================
# Amazon Testing Framework Configuration
# ===================================

# Application URL
app.url=https://www.amazon.in/

# Browser Configuration
# Supported browsers: chrome, firefox, edge
browser=chrome

# Headless Mode - true/false
headless.mode=false

# Wait Timeouts (in seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=20

# Screenshot Configuration
screenshot.on.failure=true

# Report Configuration
report.path=test-output/allure-results

# Test Data
testdata.path=src/test/resources/testdata/

# Logging Configuration
log.level=INFO

# Email Configuration (optional for reports)
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.username=your-email@gmail.com
email.password=your-password
email.recipients=recipient@example.com

# Parallel Execution
parallel.threads=1

# Retry Configuration
retry.count=0

# API Configuration (if needed)
api.base.url=https://api.amazon.com
api.timeout=10000
